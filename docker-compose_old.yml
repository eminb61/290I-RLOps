version: '3.11'

services:
  rl_algorithm:
    build:
      context: ./RL-UAM
    ports:
      - "6006:6006"       
    networks:
      - rl_network
    volumes:
      - ./RL-UAM:/app 
      - ./configs/rl/config_training.json:/app/config_rl_training.json    
      - ./configs/sb3/sweep_config_maskable_ppo.json:/app/sweep_config_maskable_ppo.json      


  vertisim_service:
    build:
      context: .
      dockerfile: ./vertisim/Dockerfile
    ports:
      - "5001:5001"
    networks:
      - rl_network
    volumes:
      - ./configs/rl/config_training.json:/app/config.json   
      - ./vertisim:/app/vertisim

  service_orchestrator:
    build:
      context: ./service-orchestrator
    ports:
      - "6000:6000"
    networks:
      - rl_network
    depends_on:
      - vertisim_service
    volumes:
      - ./service-orchestrator:/app   

networks:
  rl_network:
    driver: bridge