version: '3.11'

services:
  vertisim_service:
    build:
      context: .
      dockerfile: ./vertisim/Dockerfile
    ports:
      - "5001:5001"
    networks:
      - rl_network
    volumes:
      - ./configs/rl/config_training.json:/app/config.json   
      - ./vertisim:/app/vertisim
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  service_orchestrator:
    build:
      context: ./service-orchestrator
    ports:
      - "6000:6000"
    networks:
      - rl_network
    depends_on:
      vertisim_service:
        condition: service_healthy
    volumes:
      - ./service-orchestrator:/app   

  rl_algorithm:
    build:
      context: ./RL-UAM
    ports:
      - "6006:6006"    
    networks:
      - rl_network
    volumes:
      - ./RL-UAM:/app 
      - ./configs/rl/config_training.json:/app/config_rl_training.json:rw   
      - ./configs/sb3/sweep_config_maskable_ppo.json:/app/sweep_config_maskable_ppo.json   
      - ./configs/sb3/maskedppo.yaml:/app/maskedppo.yaml
      - ./logs:/app/logs  # Mount logs directory
      - ./model:/app/model  # Mount models directory
      - ./configs/rl/config_prediction.json:/app/config_rl_prediction.json:ro
      - ./vertisim/input:/app/vertisim/input:ro  # Mount input data
    environment:
      - CONFIG_PATH=/app/config_rl_training.json
    depends_on:
      service_orchestrator:
        condition: service_started

networks:
  rl_network:
    driver: bridge